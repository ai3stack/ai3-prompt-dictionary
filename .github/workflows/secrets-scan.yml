name: Secrets scan (gitleaks)

# General secrets scan — triggered on PR + push
#
# Acts as the CI backstop for the local gitleaks pre-commit hook. The local hook
# can be bypassed with `--no-verify`; this workflow enforces server-side, unbypassable.
#
# Requires no secret / variable configuration — works out of the box.
#
# What to do on failure:
#   - True false positive: add a .gitleaks.toml allowlist locally, commit, re-run
#   - True leak: follow this repo's SECURITY.md §7 "Incident response" — revoke + rotate the secret

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # gitleaks scans full history, more thorough than diff-only
          persist-credentials: false

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan repo
        run: |
          set -euo pipefail
          # --redact: never print the secret itself to logs even on a match
          # --no-banner: reduce noise
          # .gitleaks.toml is read automatically if present
          gitleaks detect --source . --redact --no-banner --verbose
