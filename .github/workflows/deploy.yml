name: Release dataset

# Push a v* tag -> publish a GitHub Release with downloadable data packages:
#   - ai3-prompt-dictionary-<tag>-en-US.json
#   - ai3-prompt-dictionary-<tag>-bundle.zip   (prompts + categories + ui)
#   - SHA256SUMS
#
# Design: this repo does NOT deploy to any server (see docs/DECISIONS.md D-0001).
# Downstream consumers (consumer website, NPM packages, third parties) pull
# from the release, not from main.
#
# Triggers:
#   - push of a v*.*.* tag        (official release)
#   - workflow_dispatch           (dry run / manual verification)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package (e.g. v1.0.0). For dry runs only.'
        required: true
        default: 'v0.0.0-dry'

permissions:
  contents: write   # required to publish releases; everything else stays minimal

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate dataset
        run: |
          mkdir -p locales
          python3 scripts/merge_content.py
          python3 scripts/validate_prompts.py

      - name: Package artifacts
        id: pkg
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"
          OUT="dist/${TAG}"
          mkdir -p "${OUT}"

          # Single-locale prompts_index.json (most common consumption form)
          cp locales/en-US/prompts_index.json "${OUT}/ai3-prompt-dictionary-${TAG}-en-US.json"

          # Full bundle: prompts + categories + ui
          ( cd locales && zip -qr "../${OUT}/ai3-prompt-dictionary-${TAG}-bundle.zip" . )

          # Checksums
          ( cd "${OUT}" && sha256sum *.json *.zip > SHA256SUMS )

          ls -la "${OUT}"
          echo "dir=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"
          {
            echo "## AI³ Prompt Dictionary · ${TAG}"
            echo
            echo "Structured English (en-US) AI prompt dataset under MIT."
            echo
            echo "### Downloads"
            echo "- \`ai3-prompt-dictionary-${TAG}-en-US.json\` — English prompts (flattened)"
            echo "- \`ai3-prompt-dictionary-${TAG}-bundle.zip\` — full bundle (prompts + categories + UI strings)"
            echo "- \`SHA256SUMS\` — verify your download"
            echo
            echo "### Schema"
            echo "See [docs/PROMPT_SCHEMA.md](https://github.com/${{ github.repository }}/blob/${TAG}/docs/PROMPT_SCHEMA.md)."
            echo
            echo "### Changes"
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${TAG}/CHANGELOG.md)."
          } > release_notes.md

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda   # v2.2.1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: AI³ Prompt Dictionary ${{ steps.tag.outputs.name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: |
            ${{ steps.pkg.outputs.dir }}/*

      - name: Dry-run summary (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Dry run complete — no release created."
          echo "Artifacts that would be uploaded:"
          ls -la "${{ steps.pkg.outputs.dir }}"
