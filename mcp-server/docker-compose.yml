services:
  ai3-prompts-mcp:
    build: .
    container_name: ai3-prompts-mcp
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/sse"]
      interval: 30s
      timeout: 5s
      retries: 3
